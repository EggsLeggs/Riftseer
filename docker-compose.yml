version: "3.9"

# Local dev stack: Redis only.
# API runs via: bun dev:api  (wrangler dev at http://localhost:8789)
# Ingest is a separate Cloudflare Worker (packages/ingest-worker).
# Reddit bot is a Devvit app — deploy with: cd packages/reddit-bot && npx devvit upload

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
